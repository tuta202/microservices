services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: orders
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 20

  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: inventory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: payments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payments"]
      interval: 5s
      timeout: 5s
      retries: 20

  order-service:
    build: ./services/order-service
    environment:
      SERVICE_NAME: order-service
      DATABASE_URL: postgresql://app:app@order-db:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8001:8000"
    depends_on:
      rabbitmq: { condition: service_healthy }
      order-db: { condition: service_healthy }

  inventory-service:
    build: ./services/inventory-service
    environment:
      SERVICE_NAME: inventory-service
      DATABASE_URL: postgresql://app:app@inventory-db:5432/inventory
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8002:8000"
    depends_on:
      rabbitmq: { condition: service_healthy }
      inventory-db: { condition: service_healthy }

  payment-service:
    build: ./services/payment-service
    environment:
      SERVICE_NAME: payment-service
      DATABASE_URL: postgresql://app:app@payment-db:5432/payments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_FAILURE_RATE: "0.20"
    ports:
      - "8003:8000"
    depends_on:
      rabbitmq: { condition: service_healthy }
      payment-db: { condition: service_healthy }

  notification-service:
    build: ./services/notification-service
    environment:
      SERVICE_NAME: notification-service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8004:8000"
    depends_on:
      rabbitmq: { condition: service_healthy }
